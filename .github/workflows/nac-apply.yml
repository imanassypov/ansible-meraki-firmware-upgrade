---
# nac-apply.yml — Network as Code: Terraform apply on data model change
#
# Triggered when any file under data-model/nac/ is pushed to main.
# Runs on the self-hosted runner on your local laptop, which has access to
# local Terraform state and injects credentials via the runner environment.
#
# Runner setup:
#   https://github.com/imanassypov/ansible-meraki-firmware-upgrade/settings/actions/runners
#
# Required env vars set in ~/actions-runner/.env on the self-hosted runner:
#   MERAKI_API_KEY         — Meraki Dashboard API key
#   MERAKI_CISCO_LAB_PSK   — PSK for Test-WiFi SSID on Meraki Core
#   MERAKI_FTD_PSK         — PSK for Test-WiFi SSID on ASUSNET

name: "NaC — Terraform apply"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "data-model/nac/**"

jobs:
  terraform-apply:
    name: "terraform apply"
    runs-on: self-hosted

    defaults:
      run:
        working-directory: network-as-code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false tfplan
