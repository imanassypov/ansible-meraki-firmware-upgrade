[defaults]
# Inventory to use when -i is not specified on the command line
inventory = ansible/inventory/meraki.yml

# Use YAML output callback for human-readable multiline strings.
# Without this, debug msg blocks print as a single JSON-encoded line with \n.
stdout_callback = yaml

# Vault password file — automatically used by all ansible-playbook and
# ansible-vault commands so you never need --vault-password-file on the CLI.
# This file is excluded from Git via .gitignore.
vault_password_file = .vault_pass

# Suppress deprecation warnings from the cisco.meraki collection
deprecation_warnings = False

[inventory]
# Silence warnings about the localhost inventory having no group vars
unparsed_is_failed = False
